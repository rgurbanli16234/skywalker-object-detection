apiVersion: apps/v1
kind: Deployment
metadata:
  name: skywalker-detector
  namespace: ml-production
  labels:
    app: skywalker-detector
spec:
  replicas: 3
  selector:
    matchLabels:
      app: skywalker-detector
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: skywalker-detector
    spec:
      containers:
      - name: detector-api
        image: skywalker-detector:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8000
        env:
        - name: MODEL_PATH
          value: "/app/release/onnx/best.onnx"
        resources:
          requests:
            cpu: "1"
            memory: "1Gi"
          limits:
            cpu: "2"
            memory: "4Gi"
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 15
          periodSeconds: 20
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 10
