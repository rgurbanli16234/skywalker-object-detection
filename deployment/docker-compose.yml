version: '3.8'

services:
  api:
    build:
      context: ..
      dockerfile: deployment/api/Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ../release:/app/release
    environment:
      - MODEL_PATH=/app/release/onnx/best.onnx
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api
    restart: unless-stopped
