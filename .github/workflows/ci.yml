name: Skywalker Object Detection CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3

    - name: Set up Python 3.10
      uses: actions/setup-python@v4
      with:
        python-version: "3.10"
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install flake8 pytest

    - name: Lint with flake8
      run: |
        flake8 src/ --count --select=E9,F63,F7,F82 --show-source --statistics
        flake8 src/ --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

    - name: Run pipeline dry run
      run: |
        python src/train.py --epochs 1 --batch 2 --data dataset/dummy/dummy_data.yaml
        python src/evaluate.py --data dataset/dummy/dummy_data.yaml
        python src/benchmark.py
        
    - name: Build Docker Image
      run: |
        docker build -t skywalker-detector:latest -f deployment/api/Dockerfile .
