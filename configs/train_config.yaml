# YOLOv8 Training Hyperparameters & Pipeline Configuration

# Model settings
model: yolov8m.pt              # Use YOLOv8m (best trade-off for accuracy/VRAM on this GPU)

# Dataset settings
data: data.yaml                 # Path to data.yaml dataset config file

# Training hyperparameters
epochs: 30                      # Train for 30 epochs (good balance)
imgsz: 640                      # Image size (640x640)
batch: 4                        # Batch size optimized for 3.68GB VRAM
device: 0                       # GPU device (0 for CUDA 0, or "cpu")
amp: true                       # Enable Automatic Mixed Precision (AMP)
deterministic: true             # Use deterministic training for reproducibility
plots: true                     # Save training curves, confusion matrix, PR/F1 curves
save: true                      # Enable automatic checkpointing and save best.pt / last.pt
patience: 10                    # Early stopping patience
lr0: 0.01                       # Initial learning rate
lrf: 0.01                       # Final learning rate (cosine scheduler)
cos_lr: true                    # Cosine learning rate scheduler
mosaic: 1.0                     # Heavy mosaic augmentation
mixup: 0.15                     # Mixup augmentation
hsv_h: 0.015                    # HSV hue augmentation
hsv_s: 0.7                      # HSV saturation augmentation
hsv_v: 0.4                      # HSV value augmentation
degrees: 0.0                    # Rotation degrees
translate: 0.1                  # Translation
scale: 0.5                      # Scale augmentation
shear: 0.0                      # Shear augmentation
perspective: 0.0                # Perspective augmentation
flipud: 0.0                     # Vertical flip
fliplr: 0.5                     # Horizontal flip
copy_paste: 0.3                 # Copy-paste augmentation
label_smoothing: 0.1            # Label smoothing
cache: "ram"                    # Cache dataset in RAM
multi_scale: true               # Multi-scale training
verbose: true                   # Print progress logs to stdout
seed: 42                        # Seed for deterministic reproducibility

# Output directory settings
project: outputs                # Root folder for saving model outputs
name: skywalker_yolov8m_final   # Subdirectory for this specific training run
exist_ok: true                  # Overwrite or resume in the same directory if it exists
