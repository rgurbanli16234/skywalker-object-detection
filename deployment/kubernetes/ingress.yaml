apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: skywalker-detector-ingress
  namespace: ml-production
  annotations:
    kubernetes.io/ingress.class: nginx
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
spec:
  tls:
  - hosts:
    - detector.skywalker-ai.local
    secretName: skywalker-detector-tls
  rules:
  - host: detector.skywalker-ai.local
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: skywalker-detector-service
            port:
              number: 80
